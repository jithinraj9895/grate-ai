services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectordb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: .
      dockerfile: grate/Dockerfile

    container_name: grate-api

    depends_on:
      - sqlserver
      - rabbitmq

    ports:
      - "5000:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServerConnection: Server=sqlserver;Database=GrateDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672

  embedding-worker:
    build:
      context: ./py-embedding-worker
      
    container_name: embedding-worker
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy

    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vectordb
      DB_USER: postgres
      DB_PASSWORD: postgres
      MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2

volumes:
  sqlserver_data:
  postgres_data:
  rabbitmq_data: